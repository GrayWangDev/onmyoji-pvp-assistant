<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Onmyoji PVP Assistant</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="BP 输入">
        <div class="panel-header">
          <div>
            <h1>Onmyoji PVP Assistant</h1>
            <p>2026-05 · ban祸津神 · 市加美版本</p>
          </div>
          <button id="resetButton" class="icon-button" type="button" title="重置">
            ↺
          </button>
        </div>

        <div class="field-grid">
          <label class="field">
            <span>我方 ban</span>
            <select id="ourBanSelect"></select>
          </label>
          <label class="field">
            <span>敌方 ban</span>
            <select id="enemyBanSelect"></select>
          </label>
        </div>

        <div class="selected-strip">
          <div class="strip-title">敌方已选</div>
          <div id="enemyPickedList" class="picked-list"></div>
        </div>

        <label class="field search-field">
          <span>添加敌方式神</span>
          <input id="shikigamiSearch" type="search" placeholder="输入简称，例如 离、封、骷髅、面" />
        </label>

        <div id="quickPickGrid" class="quick-pick-grid" aria-label="式神选择"></div>

        <section class="ocr-panel" aria-label="截图识别实验">
          <div class="strip-title">截图识别实验</div>
          <label class="file-drop">
            <input id="screenshotInput" type="file" accept="image/*" />
            <span>上传 BP 截图</span>
          </label>
          <canvas id="screenshotCanvas" class="screenshot-canvas"></canvas>
          <div class="ocr-actions">
            <button id="ocrLeftButton" class="pick-button" type="button">识别左侧名字牌</button>
            <button id="ocrRightButton" class="pick-button" type="button">识别右侧名字牌</button>
          </div>
          <div id="ocrStatus" class="ocr-status">上传截图后，可先识别中间角色名字牌。蓝框是候选范围，会同时兼容手机和电脑端位置。</div>
          <div id="ocrResults" class="ocr-results"></div>
        </section>
      </section>

      <section class="result-panel" aria-label="推荐结果">
        <div class="result-toolbar">
          <div>
            <h2>推荐结果</h2>
            <p id="contextLine"></p>
          </div>
          <span id="matchCount" class="count-badge"></span>
        </div>

        <div id="results" class="results"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
